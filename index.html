<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhino Roofs — Production Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f5f3;font-size:13px}
.wrap{max-width:1100px;margin:0 auto;padding:1.25rem 1.5rem 3rem}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 1rem;border-bottom:2px solid #1F3864;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.topbar-brand h1{font-size:18px;font-weight:700;color:#1F3864;letter-spacing:-0.02em}
.topbar-brand p{font-size:11px;color:#888;margin-top:1px}
.topbar-right{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.btn{font-size:12px;padding:6px 13px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#333;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#1F3864;color:#fff;border-color:#1F3864;font-weight:500}
.btn-primary:hover{background:#162d52}
.btn-red{background:#ED2229;color:#fff;border-color:#ED2229}
.btn-red:hover{background:#c41c22}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;gap:0;border:1px solid #ddd;border-radius:6px;overflow:hidden;width:fit-content}
.week-tab{font-size:12px;padding:7px 18px;background:#fff;border:none;border-right:1px solid #ddd;color:#555;cursor:pointer;white-space:nowrap;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px}
.week-tab:last-child{border-right:none}
.week-tab.active{background:#1F3864;color:#fff;font-weight:500}
.week-tab.active .week-tab-sub{color:rgba(255,255,255,0.65)}
.week-tab:hover:not(.active){background:#f5f5f3}
.week-tab-label{font-size:12px;font-weight:500}
.week-tab-sub{font-size:10px;color:#999}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.stat{background:#fff;border-radius:8px;padding:9px 11px;border:1px solid #e8e8e8}
.stat-label{font-size:11px;color:#888;margin-bottom:3px}
.stat-val{font-size:18px;font-weight:600;color:#1a1a1a}

/* TOOLBAR */
.toolbar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.tlabel{font-size:12px;color:#777;white-space:nowrap}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;white-space:nowrap;font-family:inherit}
.pill.active{background:#1F3864;color:#fff;border-color:#1F3864}
.pill:hover:not(.active){background:#f5f5f3}
.sep{width:1px;height:14px;background:#ddd;margin:0 2px}

/* DAY SECTIONS */
.day-band{display:grid;grid-template-columns:1fr auto;align-items:center;background:#1F3864;padding:6px 10px;margin-top:12px;border-radius:4px 4px 0 0}
.day-band:first-of-type{margin-top:0}
.day-band-title{font-size:12px;font-weight:600;color:#fff;letter-spacing:.07em;text-transform:uppercase}
.day-band-meta{font-size:11px;color:rgba(255,255,255,.6)}

table.sched{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 4px 4px;overflow:hidden}
table.sched thead th{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;padding:5px 8px;border-bottom:1px solid #e5e5e5;text-align:left;background:#f9f9f7}
table.sched thead th.r{text-align:right}
table.sched tbody tr.job-row{border-left:3px solid transparent;cursor:pointer}
table.sched tbody tr.job-row:hover{background:#f5f5f3}
table.sched tbody tr.job-row td{padding:5px 8px;border-bottom:1px solid #f0f0ee;vertical-align:middle;font-size:12px}
table.sched tbody tr.note-row td{padding:2px 8px 6px 14px;border-bottom:1px solid #f0f0ee;font-size:11px;color:#888;line-height:1.5;cursor:pointer}
table.sched tbody tr.note-row:hover{background:#f5f5f3}
table.sched tbody tr.note-row.flag-note td{color:#b91c1c}
table.sched tbody tr.empty-day td{padding:10px;font-size:12px;color:#bbb;font-style:italic;text-align:center}

.r-metal{border-left-color:#888780}.r-tile{border-left-color:#BA7517}.r-shingle{border-left-color:#378ADD}
.r-vendor{border-left-color:#D4537E}.r-repair{border-left-color:#EF9F27}.r-dumpster{border-left-color:#aaa}
.r-inspect{border-left-color:#7F77DD}.r-roll{border-left-color:#1D9E75}.r-other{border-left-color:#ccc}

.col-job{width:54px;font-size:11px;font-weight:600;color:#666}
.col-addr{min-width:150px}.addr-main{font-weight:500}
.col-pm{width:58px}.col-sub{width:135px;color:#666;font-size:11px}
.col-type{width:115px}.col-sq{width:38px;text-align:right;color:#888;font-size:11px}
.col-flag{width:30px;text-align:center}

.pm-pill{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;display:inline-block;font-weight:500}
.pm-hector{background:#dbeafe;color:#1e40af}.pm-naji{background:#fef3c7;color:#92400e}
.pm-richard{background:#dcfce7;color:#166534}.pm-anthony{background:#ede9fe;color:#5b21b6}.pm-other{background:#f3f4f6;color:#374151}

.type-pill{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;display:inline-block;font-weight:500}
.t-demo{background:#fee2e2;color:#7f1d1d}.t-install{background:#d1fae5;color:#064e3b}
.t-roll{background:#ede9fe;color:#3b0764}.t-repair{background:#fef3c7;color:#78350f}
.t-dumpster{background:#f3f4f6;color:#374151}.t-vendor{background:#fce7f3;color:#831843}
.t-inspect{background:#dbeafe;color:#1e3a8a}.t-other{background:#f3f4f6;color:#374151}

.unassigned{color:#b91c1c;font-weight:600;font-size:11px}
.flag-icon{color:#ED2229;font-size:12px}
.note-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#2563eb;vertical-align:middle}

/* INTAKE DRAWER */
.intake-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:200;justify-content:flex-end}
.intake-overlay.open{display:flex}
.intake-drawer{background:#fff;width:100%;max-width:420px;height:100%;overflow-y:auto;border-left:1px solid #ddd;display:flex;flex-direction:column}
.intake-header{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.intake-title{font-size:15px;font-weight:600;color:#1F3864}
.intake-subtitle{font-size:12px;color:#888;margin-top:2px}
.intake-close{font-size:22px;cursor:pointer;color:#aaa;background:none;border:none;line-height:1;padding:0;font-family:inherit}
.intake-close:hover{color:#333}
.intake-body{padding:1.25rem;flex:1}
.intake-footer{padding:1rem 1.25rem;border-top:1px solid #eee;display:flex;gap:8px;position:sticky;bottom:0;background:#fff}
.intake-footer .btn{flex:1;justify-content:center;display:flex;align-items:center}

.frow{margin-bottom:14px}
.flabel{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block}
.finput,.fselect,.ftextarea{width:100%;font-size:13px;border:1px solid #ddd;border-radius:6px;padding:7px 10px;background:#fafafa;color:#333;font-family:inherit}
.finput:focus,.fselect:focus,.ftextarea:focus{outline:none;border-color:#1F3864;background:#fff}
.ftextarea{resize:vertical;min-height:72px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.freq{color:#ED2229;margin-left:2px}

/* SUCCESS TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;background:#1F3864;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:300;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* EDIT MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:200;align-items:flex-start;justify-content:center;padding-top:50px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.25rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;border-bottom:1px solid #eee;padding-bottom:10px}
.modal-title{font-size:14px;font-weight:600}
.modal-close{font-size:22px;cursor:pointer;color:#aaa;background:none;border:none;line-height:1;padding:0;font-family:inherit}
.mrow{margin-bottom:10px}
.mlabel{font-size:11px;color:#888;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.mval{font-size:12px;color:#555;line-height:1.5;padding:4px 0}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mselect,.minput{width:100%;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:6px 8px;background:#fafafa;color:#333;font-family:inherit}
.mselect:focus,.minput:focus{outline:none;border-color:#1F3864}
.mtextarea{width:100%;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:6px 8px;background:#fafafa;color:#333;resize:vertical;min-height:60px;font-family:inherit}
.modal-actions{display:flex;gap:8px;margin-top:1rem;justify-content:space-between;align-items:center}

/* UNSCHEDULED */
.unsched-section{margin-top:1.25rem;border-top:1px solid #ddd;padding-top:1rem}
.unsched-head{font-size:12px;font-weight:600;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.unsched-badge{font-size:11px;padding:2px 9px;border-radius:20px;background:#fee2e2;color:#b91c1c;font-weight:600}

/* LEGEND */
.legend-row{display:flex;gap:12px;flex-wrap:wrap;padding:10px 0;border-top:1px solid #e5e5e5;margin-top:14px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.leg-bar{width:3px;height:14px;border-radius:2px;flex-shrink:0}

/* WEEK HEADER */
.week-section{margin-bottom:2rem}
.week-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #ddd}
.week-section-title{font-size:14px;font-weight:600;color:#1F3864}
.week-section-meta{font-size:12px;color:#888}

@media print{
  .topbar-right,.toolbar,.intake-overlay,.modal-overlay,.toast,.week-nav{display:none!important}
  .wrap{padding:.5rem}
  .stats{display:none}
  .day-band{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="topbar-brand">
    <h1>Rhino Roofs &amp; General Construction</h1>
    <p id="topbar-sub">Production Schedule</p>
  </div>
  <div class="topbar-right">
    <button class="btn btn-primary" onclick="openIntake()">+ Add job</button>
    <button class="btn" onclick="window.print()">Print / PDF</button>
  </div>
</div>

<!-- WEEK NAVIGATION -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
  <div class="week-nav" id="week-nav"></div>
  <button class="btn" id="filter-flag-btn" onclick="toggleFlagFilter()" style="color:#b91c1c;border-color:#fca5a5">Flagged only</button>
</div>

<!-- FILTERS -->
<div class="toolbar">
  <span class="tlabel">PM:</span>
  <button class="pill active" data-f="pm" data-v="all" onclick="setF('pm','all',this)">All</button>
  <span id="pm-pills"></span>
  <div class="sep"></div>
  <span class="tlabel">Type:</span>
  <button class="pill active" data-f="wt" data-v="all" onclick="setF('wt','all',this)">All</button>
  <button class="pill" data-f="wt" data-v="demo" onclick="setF('wt','demo',this)">Demo</button>
  <button class="pill" data-f="wt" data-v="install" onclick="setF('wt','install',this)">Install</button>
  <button class="pill" data-f="wt" data-v="roll" onclick="setF('wt','roll',this)">Roll forming</button>
  <button class="pill" data-f="wt" data-v="repair" onclick="setF('wt','repair',this)">Repair</button>
  <button class="pill" data-f="wt" data-v="dumpster" onclick="setF('wt','dumpster',this)">Dumpster</button>
  <button class="pill" data-f="wt" data-v="vendor" onclick="setF('wt','vendor',this)">Vendor</button>
  <button class="pill" data-f="wt" data-v="inspect" onclick="setF('wt','inspect',this)">Inspection</button>
</div>

<div class="stats" id="stats"></div>
<div id="schedule-wrap"></div>

<div id="unsched-section" class="unsched-section" style="display:none">
  <div class="unsched-head">Unscheduled / needs assignment <span class="unsched-badge" id="unsched-count">0</span></div>
  <table class="sched" style="border-radius:6px;border:1px solid #e0e0e0">
    <thead><tr><th class="col-job">Job #</th><th class="col-addr">Address</th><th class="col-pm">PM</th><th class="col-sub">Crew / vendor</th><th class="col-type">Type</th><th class="col-sq r">Sq</th><th class="col-flag"></th></tr></thead>
    <tbody id="unsched-body"></tbody>
  </table>
</div>

<div class="legend-row">
  <div class="leg"><div class="leg-bar" style="background:#888780"></div>Metal</div>
  <div class="leg"><div class="leg-bar" style="background:#BA7517"></div>Tile</div>
  <div class="leg"><div class="leg-bar" style="background:#378ADD"></div>Shingle</div>
  <div class="leg"><div class="leg-bar" style="background:#D4537E"></div>Vendor</div>
  <div class="leg"><div class="leg-bar" style="background:#EF9F27"></div>Repair</div>
  <div class="leg"><div class="leg-bar" style="background:#aaa"></div>Dumpster</div>
  <div class="leg"><div class="leg-bar" style="background:#7F77DD"></div>Inspection</div>
  <div class="leg"><div class="leg-bar" style="background:#1D9E75"></div>Roll forming</div>
  <div class="leg" style="margin-left:auto"><span class="flag-icon">⚑</span> Flagged &nbsp;<span class="note-dot"></span> Note</div>
</div>

</div><!-- end wrap -->

<!-- INTAKE DRAWER -->
<div class="intake-overlay" id="intake-overlay" onclick="closeIntakeBG(event)">
  <div class="intake-drawer" onclick="event.stopPropagation()">
    <div class="intake-header">
      <div>
        <div class="intake-title">Add job to schedule</div>
        <div class="intake-subtitle" id="intake-subtitle">Fill in what you know — save to add to the board</div>
      </div>
      <button class="intake-close" onclick="closeIntake()">×</button>
    </div>
    <div class="intake-body">
      <div class="fgrid">
        <div>
          <label class="flabel">Job # <span class="freq">*</span></label>
          <input class="finput" id="f-job" placeholder="#10387">
        </div>
        <div>
          <label class="flabel">Date <span class="freq">*</span></label>
          <input class="finput" id="f-date" type="date">
        </div>
      </div>

      <div class="frow">
        <label class="flabel">Address <span class="freq">*</span></label>
        <input class="finput" id="f-addr" placeholder="1802 SE Beving Ave, Port St. Lucie">
      </div>

      <div class="fgrid">
        <div>
          <label class="flabel">Work order type <span class="freq">*</span></label>
          <select class="fselect" id="f-type" onchange="onTypeChange()">
            <option value="">— Select —</option>
            <optgroup label="Roof work">
              <option value="Roof Demo">Roof Demo</option>
              <option value="Metal Roof install">Metal Roof install</option>
              <option value="Shingle Roof install">Shingle Roof install</option>
              <option value="Tile Roof install">Tile Roof install</option>
              <option value="Metal Roll Forming">Metal Roll Forming</option>
            </optgroup>
            <optgroup label="Other work">
              <option value="Repair">Repair</option>
              <option value="Dumpster">Dumpster</option>
              <option value="Vendor - Solar Removal">Vendor - Solar Removal</option>
              <option value="Vendor - Gutter">Vendor - Gutter</option>
              <option value="Vendor - Stucco">Vendor - Stucco</option>
              <option value="Inspection">Inspection</option>
              <option value="Punch List">Punch List</option>
            </optgroup>
          </select>
        </div>
        <div id="roof-type-wrap">
          <label class="flabel">Roof type</label>
          <select class="fselect" id="f-roof">
            <option value="">—</option>
            <option value="Metal">Metal</option>
            <option value="Tile">Tile</option>
            <option value="Shingle">Shingle</option>
          </select>
        </div>
      </div>

      <div class="fgrid">
        <div>
          <label class="flabel">PM</label>
          <select class="fselect" id="f-pm">
            <option value="">—</option>
            <option value="Hector">Hector</option>
            <option value="Naji">Naji</option>
            <option value="Richard">Richard</option>
            <option value="Anthony">Anthony</option>
          </select>
        </div>
        <div>
          <label class="flabel">Crew / vendor</label>
          <select class="fselect" id="f-sub">
            <option value="—">— Unassigned —</option>
            <option value="Eddie Mendez">Eddie Mendez</option>
            <option value="Victor Ruiz">Victor Ruiz</option>
            <option value="Luis Hernandez">Luis Hernandez</option>
            <option value="Oscar Torrez">Oscar Torrez</option>
            <option value="Kevin Ortega">Kevin Ortega</option>
            <option value="Fernando Mateos">Fernando Mateos</option>
            <option value="Fabian Zamudio">Fabian Zamudio</option>
            <option value="Byron Metal Installer">Byron Metal Installer</option>
            <option value="Ivan">Ivan</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="frow">
        <label class="flabel">Squares</label>
        <input class="finput" id="f-sq" type="number" step="0.01" min="0" placeholder="0">
      </div>

      <div class="frow">
        <label class="flabel">Notes</label>
        <textarea class="ftextarea" id="f-notes" placeholder="Special instructions, materials, access codes, flags..."></textarea>
      </div>

      <div class="frow">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#555">
          <input type="checkbox" id="f-flag" style="cursor:pointer;width:15px;height:15px">
          <span>Flag this job <span style="font-size:11px;color:#888">(needs attention before it can run)</span></span>
        </label>
      </div>
    </div>
    <div class="intake-footer">
      <button class="btn" onclick="closeIntake()">Cancel</button>
      <button class="btn btn-primary" onclick="submitJob()">Save job to schedule</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeMBG(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Edit job</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn" id="m-flag-btn" onclick="toggleFlag()" style="color:#ED2229;border-color:#ED2229">Flag job</button>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="deleteJob()" style="color:#b91c1c">Delete</button>
        <button class="btn btn-primary" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const CREWS=['Eddie Mendez','Victor Ruiz','Luis Hernandez','Oscar Torrez','Kevin Ortega','Fernando Mateos','Fabian Zamudio','Byron Metal Installer','Ivan','—','Other'];
const PMS=['Hector','Naji','Richard','Anthony','—'];
const TYPES=['Roof Demo','Metal Roof install','Shingle Roof install','Tile Roof install','Metal Roll Forming','Repair','Dumpster','Vendor - Solar Removal','Vendor - Gutter','Vendor - Stucco','Inspection','Punch List'];
const DAY_NAMES=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_LONG=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEK_LONG=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ── STATE ──────────────────────────────────────────────────────────────────
// weeks = array of { weekKey: "2026-W15", label: "Apr 6 – 10", days: [...], jobs: [...] }
let weeks = [];
let activeWeekIdx = 0;
let fPM = 'all', fWT = 'all', fFlag = false;
let editId = null;

// ── UTILS ──────────────────────────────────────────────────────────────────
function uid(){ return Math.random().toString(36).slice(2,9); }

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function isoToDate(iso){ const [y,m,d]=iso.split('-'); return new Date(+y,+m-1,+d); }

function dateToIso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function weekKey(monday){ return dateToIso(monday); }

function weekLabel(monday){
  const fri = new Date(monday); fri.setDate(monday.getDate()+4);
  return MONTH_NAMES[monday.getMonth()]+' '+monday.getDate()+' – '+fri.getDate()+(monday.getMonth()!==fri.getMonth()?' '+MONTH_NAMES[fri.getMonth()]:'');
}

function buildWeekDays(monday){
  return Array.from({length:5},(_,i)=>{
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return { iso: dateToIso(d), label: DAY_NAMES[d.getDay()]+' · '+MONTH_NAMES[d.getMonth()]+' '+d.getDate(), full: d };
  });
}

function findOrCreateWeek(iso){
  const monday = getMonday(isoToDate(iso));
  const key = weekKey(monday);
  let idx = weeks.findIndex(w=>w.weekKey===key);
  if(idx===-1){
    weeks.push({ weekKey:key, monday, label:weekLabel(monday), days:buildWeekDays(monday), jobs:[] });
    weeks.sort((a,b)=>a.monday-b.monday);
    idx = weeks.findIndex(w=>w.weekKey===key);
    saveData();
  }
  return idx;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── PERSIST ────────────────────────────────────────────────────────────────
function saveData(){ try{ localStorage.setItem('rhino_sched_v2', JSON.stringify({weeks, activeWeekIdx})); }catch(e){} }
function loadData(){
  try{
    const raw=localStorage.getItem('rhino_sched_v2');
    if(!raw) return false;
    const d=JSON.parse(raw);
    weeks=d.weeks||[];
    // Rebuild Date objects from strings
    weeks.forEach(w=>{
      w.monday=new Date(w.monday);
      w.days=buildWeekDays(w.monday);
    });
    activeWeekIdx=Math.min(d.activeWeekIdx||0, weeks.length-1);
    return weeks.length>0;
  }catch(e){ return false; }
}

// ── CLASSIFY ───────────────────────────────────────────────────────────────
function cat(t){
  t=(t||'').toLowerCase();
  if(/roll/i.test(t)) return 'roll';
  if(/demo|tear/i.test(t)) return 'demo';
  if(/install/i.test(t)) return 'install';
  if(/repair/i.test(t)) return 'repair';
  if(/dumpster/i.test(t)) return 'dumpster';
  if(/solar|gutter|stucco|vendor/i.test(t)) return 'vendor';
  if(/inspect|punch/i.test(t)) return 'inspect';
  return 'other';
}

function rclass(j){
  const c=cat(j.type);
  if(['demo','install','other'].includes(c)){
    if(/metal/i.test(j.roofType)) return 'r-metal';
    if(/tile/i.test(j.roofType)) return 'r-tile';
    if(/shingle/i.test(j.roofType)) return 'r-shingle';
  }
  return {vendor:'r-vendor',repair:'r-repair',dumpster:'r-dumpster',inspect:'r-inspect',roll:'r-roll'}[c]||'r-other';
}

function tpill(c,label){
  const cls={demo:'t-demo',install:'t-install',roll:'t-roll',repair:'t-repair',dumpster:'t-dumpster',vendor:'t-vendor',inspect:'t-inspect',other:'t-other'}[c]||'t-other';
  const lbl={demo:'Demo',install:'Install',roll:'Roll forming',repair:'Repair',dumpster:'Dumpster',vendor:'Vendor',inspect:'Inspection',other:'Other'}[c]||'Other';
  return `<span class="type-pill ${cls}">${label||lbl}</span>`;
}

function pmpill(pm){
  if(!pm||pm==='—') return '—';
  const cls={hector:'pm-hector',naji:'pm-naji',richard:'pm-richard',anthony:'pm-anthony'}[(pm||'').toLowerCase()]||'pm-other';
  return `<span class="pm-pill ${cls}">${pm}</span>`;
}

function shortType(t){
  return (t||'').replace(/^(roof\s*)/i,'').trim()||t||'—';
}

// ── ROW HTML ───────────────────────────────────────────────────────────────
function jobRow(j){
  const c=cat(j.type), rc=rclass(j);
  const unassigned=!j.sub||j.sub==='—';
  const sq=(j.sq&&j.sq>0)?parseFloat(j.sq).toFixed(1):'—';
  const flag=j.flagged?'<span class="flag-icon" title="Flagged">⚑</span>':'';
  const nd=j.notes?'<span class="note-dot" title="Has notes"></span>':'';
  const sub=unassigned?'<span class="unassigned">UNASSIGNED</span>':`<span>${j.sub}</span>`;
  const addr=j.address||''; const ashort=addr.length>36?addr.slice(0,34)+'…':addr;
  return `<tr class="job-row ${rc}" onclick="openModal('${j.id}')">
    <td class="col-job">${j.job||'—'}</td>
    <td class="col-addr"><span class="addr-main" title="${addr}">${ashort}</span></td>
    <td class="col-pm">${pmpill(j.pm)}</td>
    <td class="col-sub">${sub}</td>
    <td class="col-type">${tpill(c,shortType(j.type))}</td>
    <td class="col-sq">${sq}</td>
    <td class="col-flag">${flag}${nd}</td>
  </tr>`;
}

function noteRow(j){
  if(!j.notes) return '';
  return `<tr class="note-row${j.flagged?' flag-note':''}" onclick="openModal('${j.id}')">
    <td colspan="7">${j.notes}</td>
  </tr>`;
}

// ── FILTERS ────────────────────────────────────────────────────────────────
function filteredJobs(jobs){
  return jobs.filter(j=>{
    if(fPM!=='all'&&(j.pm||'').toLowerCase()!==fPM.toLowerCase()) return false;
    if(fWT!=='all'&&cat(j.type)!==fWT) return false;
    if(fFlag&&!j.flagged) return false;
    return true;
  });
}

function setF(dim,val,el){
  if(dim==='pm') fPM=val; else fWT=val;
  document.querySelectorAll(`[data-f="${dim}"]`).forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleFlagFilter(){
  fFlag=!fFlag;
  document.getElementById('filter-flag-btn').classList.toggle('active',fFlag);
  document.getElementById('filter-flag-btn').style.background=fFlag?'#ED2229':'';
  document.getElementById('filter-flag-btn').style.color=fFlag?'#fff':'#b91c1c';
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  renderWeekNav();
  renderStats();
  renderPMPills();
  renderSchedule();
  renderUnscheduled();
  updateTopbarSub();
}

function updateTopbarSub(){
  if(!weeks.length){ document.getElementById('topbar-sub').textContent='Production Schedule'; return; }
  const w=weeks[activeWeekIdx];
  document.getElementById('topbar-sub').textContent=`Production Schedule — Week of ${w.label}, ${w.monday.getFullYear()}`;
}

function renderWeekNav(){
  const nav=document.getElementById('week-nav');
  const thisMonday=getMonday(new Date());
  const curKey=weekKey(thisMonday);
  // Ensure current week always exists
  ensureWeek(thisMonday);
  // Determine which 3 weeks to show: prev, current (active), next
  const curIdx=weeks.findIndex(w=>w.weekKey===curKey);
  const prevMonday=new Date(thisMonday); prevMonday.setDate(thisMonday.getDate()-7);
  const nextMonday=new Date(thisMonday); nextMonday.setDate(thisMonday.getDate()+7);
  ensureWeek(prevMonday);
  ensureWeek(nextMonday);
  const prevIdx=weeks.findIndex(w=>w.weekKey===weekKey(prevMonday));
  const activeKey=weeks[activeWeekIdx]?weeks[activeWeekIdx].weekKey:'';
  const nextIdx=weeks.findIndex(w=>w.weekKey===weekKey(nextMonday));
  function tabBtn(idx,label,sub,isCurrSnap){
    const isActive=weeks[idx]&&weeks[idx].weekKey===activeKey;
    const isCurrent=weeks[idx]&&weeks[idx].weekKey===curKey;
    const extraStyle=isCurrSnap?'color:#1F3864;font-weight:600;border-left:1px solid #ddd;':'';
    return `<button class="week-tab${isActive?' active':''}" onclick="switchWeek(${idx})" style="${extraStyle}">
      <span class="week-tab-label">${label}${(isCurrent&&!isCurrSnap)?' ·':''}</span>
      <span class="week-tab-sub">${sub}</span>
    </button>`;
  }
  const onCurrentWeek = weeks[activeWeekIdx] && weeks[activeWeekIdx].weekKey === curKey;
  if(onCurrentWeek){
    nav.innerHTML=
      tabBtn(prevIdx,'← Prev',weeks[prevIdx]?weeks[prevIdx].label:'')+
      tabBtn(curIdx,'This week',weeks[curIdx]?weeks[curIdx].label:'')+
      tabBtn(nextIdx,'Next →',weeks[nextIdx]?weeks[nextIdx].label:'');
  } else {
    // Off current week — show 4 buttons with a Current snap button
    const activePrevMonday=new Date(weeks[activeWeekIdx].monday); activePrevMonday.setDate(weeks[activeWeekIdx].monday.getDate()-7);
    const activeNextMonday=new Date(weeks[activeWeekIdx].monday); activeNextMonday.setDate(weeks[activeWeekIdx].monday.getDate()+7);
    ensureWeek(activePrevMonday); ensureWeek(activeNextMonday);
    const activePrevIdx=weeks.findIndex(w=>w.weekKey===weekKey(activePrevMonday));
    const activeNextIdx=weeks.findIndex(w=>w.weekKey===weekKey(activeNextMonday));
    nav.innerHTML=
      tabBtn(activePrevIdx,'← Prev',weeks[activePrevIdx]?weeks[activePrevIdx].label:'')+
      tabBtn(activeWeekIdx,weeks[activeWeekIdx].label,'')+
      tabBtn(curIdx,'⊙ Current',weeks[curIdx]?weeks[curIdx].label:'',true)+
      tabBtn(activeNextIdx,'Next →',weeks[activeNextIdx]?weeks[activeNextIdx].label:'');
  }
}

function ensureWeek(monday){
  const key=weekKey(monday);
  if(!weeks.find(w=>w.weekKey===key)){
    weeks.push({weekKey:key,monday:new Date(monday),label:weekLabel(monday),days:buildWeekDays(monday),jobs:[]});
    weeks.sort((a,b)=>a.monday-b.monday);
  }
}

function renderStats(){
  if(!weeks.length){ document.getElementById('stats').innerHTML=''; return; }
  const allJobs=weeks[activeWeekIdx].jobs;
  const f=filteredJobs(allJobs);
  const sq=f.filter(j=>cat(j.type)==='install').reduce((a,j)=>a+(parseFloat(j.sq)||0),0);
  const fl=allJobs.filter(j=>j.flagged).length;
  const un=allJobs.filter(j=>!j.sub||j.sub==='—').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total jobs</div><div class="stat-val">${allJobs.length}</div></div>
    <div class="stat"><div class="stat-label">Demos</div><div class="stat-val">${allJobs.filter(j=>cat(j.type)==='demo').length}</div></div>
    <div class="stat"><div class="stat-label">Installs</div><div class="stat-val">${allJobs.filter(j=>cat(j.type)==='install').length}</div></div>
    <div class="stat"><div class="stat-label">Install sq</div><div class="stat-val">${sq.toFixed(1)}</div></div>
    <div class="stat"><div class="stat-label">Flagged</div><div class="stat-val" style="color:${fl?'#ED2229':'inherit'}">${fl}</div></div>
    <div class="stat"><div class="stat-label">Unassigned</div><div class="stat-val" style="color:${un?'#b91c1c':'inherit'}">${un}</div></div>
  `;
}

function renderPMPills(){
  const allJobs=weeks.flatMap(w=>w.jobs);
  const pms=[...new Set(allJobs.map(j=>j.pm).filter(p=>p&&p!=='—'))].sort();
  document.getElementById('pm-pills').innerHTML=pms.map(pm=>
    `<button class="pill${fPM===pm?' active':''}" data-f="pm" data-v="${pm}" onclick="setF('pm','${pm}',this)">${pm}</button>`
  ).join('');
}

function renderSchedule(){
  const wrap=document.getElementById('schedule-wrap');
  if(!weeks.length){
    wrap.innerHTML=`<div style="text-align:center;padding:3rem;color:#aaa;font-size:14px">No weeks yet. Click <strong>+</strong> in the week tabs to start scheduling.</div>`;
    return;
  }
  const w=weeks[activeWeekIdx];
  const f=filteredJobs(w.jobs);
  const byDay={};
  w.days.forEach(d=>byDay[d.iso]=[]);
  f.forEach(j=>{ if(byDay[j.date]) byDay[j.date].push(j); });

  wrap.innerHTML=w.days.map(d=>{
    const dj=byDay[d.iso]||[];
    const sq=dj.filter(j=>cat(j.type)==='install').reduce((a,j)=>a+(parseFloat(j.sq)||0),0);
    const meta=dj.length?`${dj.length} job${dj.length>1?'s':''}${sq>0?' · '+sq.toFixed(1)+' sq':''}` :'No jobs';
    const tbody=dj.length
      ? dj.map(j=>jobRow(j)+noteRow(j)).join('')
      : `<tr class="empty-day"><td colspan="7">No jobs — click + Add job to schedule something here</td></tr>`;
    return `<div class="day-band"><span class="day-band-title">${d.label}</span><span class="day-band-meta">${meta}</span></div>
<table class="sched"><thead><tr>
  <th class="col-job">Job #</th><th class="col-addr">Address</th><th class="col-pm">PM</th>
  <th class="col-sub">Crew / vendor</th><th class="col-type">Type</th>
  <th class="col-sq r">Sq</th><th class="col-flag"></th>
</tr></thead><tbody>${tbody}</tbody></table>`;
  }).join('');
}

function renderUnscheduled(){
  if(!weeks.length){ document.getElementById('unsched-section').style.display='none'; return; }
  const un=weeks[activeWeekIdx].jobs.filter(j=>!j.sub||j.sub==='—');
  const sec=document.getElementById('unsched-section');
  document.getElementById('unsched-count').textContent=un.length;
  if(!un.length){ sec.style.display='none'; return; }
  sec.style.display='block';
  document.getElementById('unsched-body').innerHTML=un.map(j=>jobRow(j)+noteRow(j)).join('');
}

// ── WEEK MANAGEMENT ────────────────────────────────────────────────────────
function switchWeek(idx){
  if(idx<0||idx>=weeks.length) return;
  activeWeekIdx=idx;
  saveData();
  render();
}

// ── INTAKE ─────────────────────────────────────────────────────────────────
function openIntake(prefillDate){
  document.getElementById('f-job').value='';
  document.getElementById('f-addr').value='';
  document.getElementById('f-type').value='';
  document.getElementById('f-roof').value='';
  document.getElementById('f-pm').value='';
  document.getElementById('f-sub').value='—';
  document.getElementById('f-sq').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-flag').checked=false;

  // Prefill date to Monday of active week, or today
  if(prefillDate){
    document.getElementById('f-date').value=prefillDate;
  } else if(weeks.length&&weeks[activeWeekIdx]){
    document.getElementById('f-date').value=dateToIso(weeks[activeWeekIdx].monday);
  } else {
    document.getElementById('f-date').value=dateToIso(getMonday(new Date()));
  }

  document.getElementById('intake-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-job').focus(),100);
}

function closeIntake(){ document.getElementById('intake-overlay').classList.remove('open'); }
function closeIntakeBG(e){ if(e.target===document.getElementById('intake-overlay')) closeIntake(); }

function onTypeChange(){
  const t=document.getElementById('f-type').value;
  const c=cat(t);
  const showRoof=['demo','install','roll'].includes(c);
  document.getElementById('roof-type-wrap').style.opacity=showRoof?'1':'0.3';
}

function submitJob(){
  const job=document.getElementById('f-job').value.trim();
  const date=document.getElementById('f-date').value;
  const addr=document.getElementById('f-addr').value.trim();
  const type=document.getElementById('f-type').value;

  if(!job||!date||!addr||!type){
    alert('Please fill in Job #, Date, Address, and Work Order Type before saving.');
    return;
  }

  const j={
    id:uid(),
    job,
    date,
    address:addr,
    type,
    roofType:document.getElementById('f-roof').value,
    pm:document.getElementById('f-pm').value,
    sub:document.getElementById('f-sub').value||'—',
    sq:parseFloat(document.getElementById('f-sq').value)||0,
    notes:document.getElementById('f-notes').value.trim(),
    flagged:document.getElementById('f-flag').checked,
    coordNotes:''
  };

  // Find or create the week this job belongs to
  const wIdx=findOrCreateWeek(date);
  weeks[wIdx].jobs.push(j);
  activeWeekIdx=wIdx;
  saveData();
  render();
  closeIntake();
  showToast(`${job} added to ${weeks[wIdx].label}`);
}

function closeMBG(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function saveModal(){
  if(!editId) return;
  let j=null;
  weeks.forEach(w=>{ const found=w.jobs.find(x=>x.id===editId); if(found) j=found; });
  if(!j) return;
  j.job=document.getElementById('m-job').value.trim();
  j.date=document.getElementById('m-date').value;
  j.address=document.getElementById('m-addr').value.trim();

function toggleFlag(){
  if(!editId) return;
  let j=null;
  weeks.forEach(w=>{ const found=w.jobs.find(x=>x.id===editId); if(found) j=found; });
  if(!j) return;
  j.flagged=!j.flagged;
  const mfb=document.getElementById('m-flag-btn');
  mfb.textContent=j.flagged?'Remove flag':'Flag job';
  mfb.style.background=j.flagged?'#ED2229':'transparent';
  mfb.style.color=j.flagged?'#fff':'#ED2229';
  saveData();
  render();
}

function deleteJob(){
  if(!editId) return;
  if(!confirm('Delete this job from the schedule?')) return;
  weeks.forEach(w=>{ w.jobs=w.jobs.filter(x=>x.id!==editId); });
  saveData();
  closeModal();
  render();
  showToast('Job removed');
}
